services:
  - type: web
    name: taskboard-api
    runtime: docker
    plan: free
    repo: https://github.com/pepperony3/codex
    rootDir: taskboard
    dockerfilePath: ./docker/Dockerfile.backend
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:h2:mem:taskboard
      - key: APP_JWT_SECRET
        generateValue: true
